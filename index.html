<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hinako — Bot Policies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#e0e0e0;line-height:1.8;display:flex;align-items:center;justify-content:center}
.container{text-align:center;padding:40px}
h1{font-size:48px;background:linear-gradient(135deg,#FF69B4,#FF1493);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{color:#888;margin-bottom:40px;font-size:16px}
.cards{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:300px;backdrop-filter:blur(10px);transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(255,105,180,0.15)}
.card h2{color:#FF69B4;font-size:24px;margin-bottom:12px}
.card p{color:#888;font-size:14px;margin-bottom:20px}
.card a{display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#FF69B4,#FF1493);color:#fff;border-radius:8px;text-decoration:none;font-weight:500;font-size:14px;transition:opacity .2s}
.card a:hover{opacity:.85}
footer{margin-top:60px;color:#555;font-size:13px}
</style>
</head>
<body>
<div class="container">
<h1>🌸 Hinako</h1>
<p class="sub">Mir4 guild system manager — Bot Policies</p>
<div class="cards">
<div class="card">

<p>Terms and conditions for using the Hinako bot.</p>
<a href="terms.html">Read Terms</a>
</div>
<div class="card">
<h2>🔒 Privacy Policy</h2>
<p>How we collect, store, and protect your data.</p>
<a href="privacy.html">Read Privacy</a>
</div>
</div>
<footer>🌸 Hinako · Last updated: June 2026</footer>
</div>
</body>
</html>
